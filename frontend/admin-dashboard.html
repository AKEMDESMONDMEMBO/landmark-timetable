<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Landmark Metropolitan University</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/dashboard-new.css">
    <link rel="stylesheet" href="css/timetable-template.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Table Styles to override defaults */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: var(--spacing-4);
        }
        .data-table th {
            background-color: var(--bg-main);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: var(--spacing-4);
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table td {
            padding: var(--spacing-4);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }
        .data-table tr:hover td {
            background-color: var(--primary-light);
        }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--primary-light);
            color: var(--primary);
        }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: var(--spacing-8);
            width: 90%;
            max-width: 500px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            position: relative;
        }
        .close {
            position: absolute;
            top: var(--spacing-4);
            right: var(--spacing-4);
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        .close:hover { color: var(--text-main); }
        
        /* Notification Dropdown */
        .notification-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            width: 320px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            z-index: 100;
            margin-top: var(--spacing-2);
        }
        .notification-dropdown.active { display: block; }
        .notif-header {
            padding: var(--spacing-4);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notif-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .notif-item {
            padding: var(--spacing-4);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }
        .notif-item:hover { background-color: var(--bg-main); }
        .notif-item.unread { border-left: 3px solid var(--primary); background-color: var(--primary-light); }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="new-sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h2>LMU Admin</h2>
                    <div id="closeSidebar" style="display: none; cursor: pointer; font-size: 1.25rem; color: var(--text-muted);">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
                <p>Academic Portal</p>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-list sidebar-menu">
                    <li class="nav-item active" data-tab="dashboard">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </li>
                    <li class="nav-item" data-tab="schools">
                        <i class="fas fa-graduation-cap"></i>
                        <span>Schools</span>
                    </li>
                    <li class="nav-item" data-tab="departments">
                        <i class="fas fa-building"></i>
                        <span>Departments</span>
                    </li>
                    <li class="nav-item" data-tab="specialties">
                        <i class="fas fa-bullseye"></i>
                        <span>Specialties</span>
                    </li>
                    <li class="nav-item" data-tab="courses">
                        <i class="fas fa-book"></i>
                        <span>Courses</span>
                    </li>
                    <li class="nav-item" data-tab="lecturers">
                        <i class="fas fa-chalkboard-teacher"></i>
                        <span>Lecturers</span>
                    </li>
                    <li class="nav-item" data-tab="rooms">
                        <i class="fas fa-door-open"></i>
                        <span>Rooms</span>
                    </li>
                    <li class="nav-item" data-tab="levels">
                        <i class="fas fa-layer-group"></i>
                        <span>Levels</span>
                    </li>
                    <li class="nav-item" data-tab="users">
                        <i class="fas fa-users"></i>
                        <span>Users</span>
                    </li>
                    <li class="nav-item" data-tab="timetable">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Timetables</span>
                    </li>
                    <li class="nav-item" data-tab="profile">
                        <i class="fas fa-user-circle"></i>
                        <span>Profile</span>
                    </li>
                    <li class="nav-item" data-tab="settings" style="margin-top: var(--spacing-4);">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="nav-item" style="color: var(--error);" data-tab="logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-nav">
                <div style="display: flex; align-items: center; gap: var(--spacing-4);">
                    <div class="icon-btn" id="sidebarToggle" style="display: none;">
                        <i class="fas fa-bars"></i>
                    </div>
                    <h3 id="pageTitle" style="font-weight: 700; color: var(--text-main);">Dashboard</h3>
                </div>
                
                <div class="top-nav-right">
                    <div class="nav-actions">
                        <button class="btn btn-primary" onclick="handleAdminTab('timetable')">
                            <i class="fas fa-plus"></i> &nbsp; Generate Timetable
                        </button>
                        
                        <div class="icon-btn" id="notificationBtn">
                            <i class="fas fa-bell"></i>
                            <span class="notification-dot" id="notifBadge" style="display:none;"></span>
                            
                            <div id="notifDropdown" class="notification-dropdown">
                                <div class="notif-header">
                                    <h4 style="margin:0;">Notifications</h4>
                                    <button class="btn btn-outline btn-sm" onclick="markAllAsRead()">Mark all as read</button>
                                </div>
                                <div id="notifList" class="notif-list">
                                    <!-- Notifications will be loaded here -->
                                </div>
                            </div>
                        </div>
                        
                        <div class="icon-btn">
                            <i class="fas fa-question-circle"></i>
                        </div>
                    </div>
                    
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <div class="user-info-text">
                            <div class="user-name" id="userName"></div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-padding">
                <div id="contentArea">
                    <!-- Content will be dynamically loaded here -->
                    <div style="display: flex; align-items: center; justify-content: center; height: 300px;">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals will be appended to body by admin.js -->
    
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
