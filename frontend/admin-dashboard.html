<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Landmark Metropolitan University</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🏛️ LMU Admin</h2>
                <p>Management Portal</p>
            </div>
            <ul class="sidebar-menu">
                <li class="active" data-tab="dashboard">📊 Dashboard</li>
                <li data-tab="departments">🏢 Departments</li>
                <li data-tab="specialties">📚 Specialties</li>
                <li data-tab="courses">📖 Courses</li>
                <li data-tab="lecturers">👨‍🏫 Lecturers</li>
                <li data-tab="rooms">🚪 Rooms</li>
                <li data-tab="users">👥 Users</li>
                <li data-tab="timetable">📅 Timetable</li>
                <li data-tab="logout">🚪 Logout</li>
            </ul>
        </nav>
        <main class="main-content">
            <div class="top-bar">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="user-info">
                    <span id="userName"></span>
                </div>
            </div>
            <div id="contentArea"></div>
        </main>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>

    <script src="js/admin.js"></script>

    <script src="js/admin.js"></script>

    <script src="js/admin.js"></script>
</body>
</html>
