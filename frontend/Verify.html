<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Landmark Metropolitan University</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .otp-input-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-digit {
            width: 50px;
            height: 60px;
            font-size: 24px;
            text-align: center;
            border-radius: 12px;
            border: 2px solid var(--border);
            outline: none;
            transition: all 0.2s;
        }
        .otp-digit:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="login-container" style="padding: 0; display: flex; align-items: stretch; background: white;">
        <div class="login-info-side" style="flex: 1; background: var(--primary); display: flex; flex-direction: column; justify-content: center; padding: 60px; color: white;">
            <div style="max-width: 400px; margin: 0 auto;">
                <h1 style="font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 2rem; letter-spacing: -2px;">Secure your account.</h1>
                <p style="font-size: 1.25rem; opacity: 0.8; line-height: 1.6;">Please enter the 6-digit code sent to your registered email address to verify your identity.</p>
                <div style="margin-top: 4rem;">
                    <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 24px;">
                        <span style="font-size: 2rem;">🔒</span>
                        <p style="margin-top: 15px; font-weight: 600; font-size: 1.1rem;">Two-Factor Authentication</p>
                        <p style="opacity: 0.7; font-size: 0.9rem; margin-top: 5px;">Ensuring your data remains private and protected.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="login-form-side" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px;">
            <div class="login-box" style="box-shadow: none; border: none; max-width: 400px; text-align: center;">
                <div class="university-logo" style="text-align: center;">
                    <h2 style="color: var(--text-main); font-size: 32px; font-weight: 800; margin-bottom: 8px;">Verification</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 32px;">Enter the code sent to <br><strong id="displayEmail">your email</strong></p>
                </div>
                
                <form id="verifyForm">
                    <div class="otp-input-container">
                        <input type="text" maxlength="1" class="otp-digit" required>
                        <input type="text" maxlength="1" class="otp-digit" required>
                        <input type="text" maxlength="1" class="otp-digit" required>
                        <input type="text" maxlength="1" class="otp-digit" required>
                        <input type="text" maxlength="1" class="otp-digit" required>
                        <input type="text" maxlength="1" class="otp-digit" required>
                    </div>
                    <button type="submit" class="btn-login" style="margin-top: 20px;">Verify & Continue</button>
                </form>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>
                
                <div style="margin-top: 32px; color: var(--text-secondary); font-size: 14px;">
                    Didn't receive the code? <br>
                    <a href="#" id="resendBtn" style="color: var(--primary); font-weight: 700; text-decoration: none;">Resend OTP</a>
                </div>
                
                <div style="margin-top: 24px;">
                    <a href="Login.html" style="color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 600;">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/verify.js"></script>
</body>
</html>
